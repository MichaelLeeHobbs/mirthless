services:
  db:
    image: postgres:17-alpine
    container_name: mirthless-db-prod
    environment:
      POSTGRES_DB: mirthless
      POSTGRES_USER: mirthless
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mirthless_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mirthless -d mirthless"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - mirthless

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: mirthless-server
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://mirthless:${POSTGRES_PASSWORD:-mirthless_prod}@db:5432/mirthless
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - mirthless

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: mirthless-web
    depends_on:
      - server
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - mirthless

volumes:
  postgres_data:

networks:
  mirthless:
    driver: bridge

services:
  db:
    image: postgres:17-alpine
    container_name: mirthless-db-prod
    environment:
      POSTGRES_DB: mirthless
      POSTGRES_USER: mirthless
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mirthless -d mirthless"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - mirthless

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: mirthless-server
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://mirthless:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/mirthless
    expose:
      - "3000"
    ports:
      # Inbound connector listener ports (TCP/MLLP for HL7, DICOM C-STORE, raw HTTP
      # source channels). The HTTP API + web UI are proxied through nginx on :80 and
      # do NOT need to be published here, but source connectors bind their own ports
      # inside the container and are otherwise unreachable from sending systems.
      #
      # Publish the range your channels listen on. The default 6661-6670 matches the
      # example channels; edit MLLP_PORT_RANGE in .env (or this list) to fit your
      # deployment. See docs/ops/deployment for the listener-port strategy.
      - "${MLLP_PORT_RANGE:-6661-6670}:${MLLP_PORT_RANGE:-6661-6670}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    networks:
      - mirthless

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: mirthless-web
    depends_on:
      - server
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - mirthless

volumes:
  postgres_data:

networks:
  mirthless:
    driver: bridge

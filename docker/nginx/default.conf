server {
    listen 80;
    server_name _;

    # Allow large payloads: HL7 batches and DICOM objects can be very large
    # (DICOM files are routinely 100MB+). Sized generously; tune to your workload.
    client_max_body_size 200m;

    # ---------------------------------------------------------------------------
    # TLS termination (recommended for production)
    # ---------------------------------------------------------------------------
    # PHI must not traverse the network in plaintext. Terminate TLS here (or at an
    # upstream load balancer). To terminate at nginx, mount your certs and add a
    # second server block, then redirect port 80 -> 443:
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     # ... location blocks identical to below ...
    # }
    # And on this port-80 block: `return 301 https://$host$request_uri;`
    # ---------------------------------------------------------------------------

    # API proxy
    location /api/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health checks
    location /health {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
    }

    # Socket.IO WebSocket upgrade
    location /socket.io/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Prometheus metrics — internal networks only (no auth on the endpoint).
    # Metrics can leak operational detail; do not expose them to the public
    # internet. Allow the Docker bridge networks + loopback; deny everything else.
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://server:3000;
        proxy_set_header Host $host;
    }

    # SPA static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

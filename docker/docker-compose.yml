services:
  db:
    image: postgres:17-alpine
    container_name: mirthless-db
    environment:
      POSTGRES_DB: mirthless
      POSTGRES_USER: mirthless
      POSTGRES_PASSWORD: mirthless_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mirthless -d mirthless"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
